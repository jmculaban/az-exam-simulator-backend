spring:
  application:
    name: az-exam-simulator-backend
  datasource:
    url: jdbc:postgresql://{db}.postgres.database.azure.com:5432/postgres
    username: 
    password: 

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info