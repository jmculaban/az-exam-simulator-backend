spring:
  application:
    name: az-exam-simulator-backend
  datasource:
    url: jdbc:postgresql://psql-azexam-{env}.postgres.database.azure.com:5432/postgres
    username: 
    password: 

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    container-name: question-bank