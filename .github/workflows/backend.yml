name: Build and Deploy Backend

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: azexam-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      # 3. Build JAR
      - name: Build app
        run: mvn clean package -DskipTests

      # 4. Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 5. Login to ACR
      - name: Login to ACR
        run: |
          docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            -u ${{ secrets.ACR_USERNAME }} \
            -p ${{ secrets.ACR_PASSWORD }}
      
      # 6. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # 7. Push Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # 8. Deploy to Azure App Service
      - name: Deploy to Azure App Service
        run: |
          az webapp config container set \
            --name ${{ secrets.APP_NAME }} \
            --resource-group rg-azexam-simulator-dev \
            --container-image-name ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --container-registry-url https://${{ secrets.ACR_LOGIN_SERVER }}
      
      # 9. Restart App Service
      - name: Restart Azure App Service
        run: |
          az webapp restart \
            --name ${{ secrets.APP_NAME }} \
            --resource-group rg-azexam-simulator-dev
