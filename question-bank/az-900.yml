examCode: AZ-900
description: Microsoft Azure Fundamentals
durationMinutes: 60
randomQuestionCount: 50

# Section weights - percentages of total random questions selected
# The system will randomly select questions from each section based on these weights
# Example: 30% of 50 questions = ~15 questions from this section
sectionWeights:
  - sectionId: s1
    percentageWeight: 30   # 15 questions from Architecture & Services
  - sectionId: s2
    percentageWeight: 25   # 12-13 questions from Identity, Access & Security
  - sectionId: s3
    percentageWeight: 25   # 12-13 questions from Management & Governance
  - sectionId: s4
    percentageWeight: 20   # 10 questions from Features & Tools

sections:
  - id: s1
    title: Describe Azure architecture and services
    questions:

      - id: q1
        type: SINGLE_CHOICE
        text: What is the primary benefit of using Azure App Service?
        options:
          - Fully managed web hosting with automatic scaling
          - Direct access to physical servers
          - Manual infrastructure management only
        correctAnswer: Fully managed web hosting with automatic scaling

      - id: q2
        type: MULTIPLE_CHOICE
        text: Which compute services are available in Azure?
        options:
          - Virtual Machines and Container Instances
          - App Service and Functions
          - Firewall Management
          - User Directory only
        correctAnswers:
          - Virtual Machines and Container Instances
          - App Service and Functions

      - id: q3
        type: ORDERING
        text: Order these services from most to least management responsibility.
        options:
          - Container Instances
          - App Service
          - Virtual Machines
          - Functions
        correctOrder:
          - Virtual Machines
          - Container Instances
          - App Service
          - Functions

      - id: q4
        type: MATCHING
        text: Match Azure services to their primary use cases.
        options:
          - web apps
          - unstructured data
          - relational data
          - networking
        optionMap:
          appservice: Azure App Service
          blob: Azure Blob Storage
          sql: Azure SQL Database
          vnet: Azure Virtual Network
        correctMap:
          appservice: web apps
          blob: unstructured data
          sql: relational data
          vnet: networking

      - id: q5
        type: SINGLE_CHOICE
        text: Which Azure service provides serverless compute?
        options:
          - Azure Functions
          - Azure Virtual Machines
          - Azure SQL Database
        correctAnswer: Azure Functions

      - id: q6
        type: MULTIPLE_CHOICE
        text: What are benefits of containers in Azure?
        options:
          - Lightweight and portable
          - Fast deployment
          - Requires heavy OS overhead
          - Manual scaling needed
        correctAnswers:
          - Lightweight and portable
          - Fast deployment

      - id: q7
        type: ORDERING
        text: Order deployment models by user responsibility level.
        options:
          - Software as a Service
          - Infrastructure as a Service
          - Platform as a Service
        correctOrder:
          - Infrastructure as a Service
          - Platform as a Service
          - Software as a Service

      - id: q8
        type: MATCHING
        text: Match storage services to data types.
        options:
          - documents
          - files
          - tables
          - queues
        optionMap:
          cosmos: Cosmos DB
          fileshare: Azure Files
          storage: Table Storage
          servicebus: Service Bus
        correctMap:
          cosmos: documents
          fileshare: files
          storage: tables
          servicebus: queues

      - id: q9
        type: SINGLE_CHOICE
        text: What is Azure Kubernetes Service (AKS) used for?
        options:
          - Managed Kubernetes container orchestration
          - Static website hosting
          - Email services
        correctAnswer: Managed Kubernetes container orchestration

      - id: q10
        type: MULTIPLE_CHOICE
        text: Which of these are key features of cloud computing?
        options:
          - On-demand scalability
          - Pay-as-you-go pricing
          - Geographic redundancy
          - Hardware ownership required
        correctAnswers:
          - On-demand scalability
          - Pay-as-you-go pricing

      - id: q11
        type: ORDERING
        text: Order these by increasing level of abstraction.
        options:
          - Managed Services
          - Platform as a Service
          - Infrastructure as a Service
        correctOrder:
          - Infrastructure as a Service
          - Platform as a Service
          - Managed Services

      - id: q12
        type: MATCHING
        text: Match Azure data services to their characteristics.
        options:
          - sql
          - nosql
          - analytics
          - archive
        optionMap:
          sqldb: Azure SQL Database
          cosmos: Cosmos DB
          synapse: Synapse Analytics
          archive: Blob Archive
        correctMap:
          sqldb: sql
          cosmos: nosql
          synapse: analytics
          archive: archive

      - id: q13
        type: SINGLE_CHOICE
        text: Which service is best for real-time IoT data processing?
        options:
          - Azure Event Hubs
          - Azure Blob Storage
          - Azure SQL Database
        correctAnswer: Azure Event Hubs

      - id: q14
        type: MULTIPLE_CHOICE
        text: What are characteristics of Azure's global infrastructure?
        options:
          - Multiple geographic regions
          - High availability zones
          - Limited to one region
          - Single data center
        correctAnswers:
          - Multiple geographic regions
          - High availability zones

      - id: q15
        type: ORDERING
        text: Order these resource organization levels.
        options:
          - Resource
          - Subscription
          - Resource Group
        correctOrder:
          - Resource
          - Resource Group
          - Subscription

      - id: q16
        type: MATCHING
        text: Match compute patterns to solutions.
        options:
          - batch processing
          - realtime api
          - event driven
          - long running
        optionMap:
          batch: Batch Processing
          api: App Service
          functions: Functions
          webjobs: WebJobs
        correctMap:
          batch: batch processing
          api: realtime api
          functions: event driven
          webjobs: long running

      - id: q17
        type: SINGLE_CHOICE
        text: What does Azure Resource Manager provide?
        options:
          - Template-based infrastructure deployment
          - Physical server management only
          - Email services
        correctAnswer: Template-based infrastructure deployment

      - id: q18
        type: MULTIPLE_CHOICE
        text: Which Azure services support hybrid scenarios?
        options:
          - Azure Arc
          - Azure Stack
          - Cloud-only services
          - Dedicated hardware
        correctAnswers:
          - Azure Arc
          - Azure Stack

      - id: q19
        type: ORDERING
        text: Order Azure services by management overhead.
        options:
          - Databases
          - Storage
          - Virtual Machines
        correctOrder:
          - Virtual Machines
          - Storage
          - Databases

      - id: q20
        type: MATCHING
        text: Match services to their deployment models.
        options:
          - iaas
          - paas
          - saas
        optionMap:
          vm: Virtual Machines
          appservice: App Service
          office365: Microsoft 365
        correctMap:
          vm: iaas
          appservice: paas
          office365: saas

  - id: s2
    title: Describe Azure identity, access, and security
    questions:

      - id: q21
        type: SINGLE_CHOICE
        text: What is Azure Active Directory (Entra ID)?
        options:
          - Cloud-based identity and access management service
          - Physical security system
          - Database service
        correctAnswer: Cloud-based identity and access management service

      - id: q22
        type: MULTIPLE_CHOICE
        text: Which are authentication best practices?
        options:
          - Use strong passwords
          - Enable multi-factor authentication
          - Share credentials securely
          - Use passwordless solutions
        correctAnswers:
          - Use strong passwords
          - Enable multi-factor authentication
          - Use passwordless solutions

      - id: q23
        type: ORDERING
        text: Order security layers from perimeter to data.
        options:
          - Data encryption
          - Identity and access
          - Network security
          - Application security
        correctOrder:
          - Network security
          - Identity and access
          - Application security
          - Data encryption

      - id: q24
        type: MATCHING
        text: Match security concepts to definitions.
        options:
          - verifying identity
          - granting permissions
          - multiple methods
          - data protection
        optionMap:
          auth: Authentication
          authz: Authorization
          mfa: Multi-Factor Authentication
          encrypt: Encryption
        correctMap:
          auth: verifying identity
          authz: granting permissions
          mfa: multiple methods
          encrypt: data protection

      - id: q25
        type: SINGLE_CHOICE
        text: What does Azure Key Vault do?
        options:
          - Securely stores secrets and certificates
          - Manages user accounts only
          - Provides email services
        correctAnswer: Securely stores secrets and certificates

      - id: q26
        type: MULTIPLE_CHOICE
        text: Which access control methods does Azure support?
        options:
          - Role-Based Access Control (RBAC)
          - Network Security Groups
          - Attribute-Based Access Control
          - Physical keys only
        correctAnswers:
          - Role-Based Access Control (RBAC)
          - Network Security Groups
          - Attribute-Based Access Control

      - id: q27
        type: ORDERING
        text: Order passwordless authentication from least to most secure.
        options:
          - Windows Hello
          - FIDO2 security keys
          - Phone sign-in
        correctOrder:
          - Phone sign-in
          - Windows Hello
          - FIDO2 security keys

      - id: q28
        type: MATCHING
        text: Match Azure security services to functions.
        options:
          - edge protection
          - network filtering
          - threat intelligence
          - secret management
        optionMap:
          firewall: Azure Firewall
          nsg: Network Security Groups
          defender: Defender for Cloud
          keyvault: Key Vault
        correctMap:
          firewall: edge protection
          nsg: network filtering
          defender: threat intelligence
          keyvault: secret management

      - id: q29
        type: SINGLE_CHOICE
        text: What is the principle of least privilege?
        options:
          - Grant minimum necessary permissions
          - Grant all permissions by default
          - Remove all restrictions
        correctAnswer: Grant minimum necessary permissions

      - id: q30
        type: MULTIPLE_CHOICE
        text: Which protect against DDoS attacks?
        options:
          - Azure DDoS Protection
          - Firewall rules
          - Rate limiting
          - Proxy services
        correctAnswers:
          - Azure DDoS Protection
          - Firewall rules
          - Rate limiting

      - id: q31
        type: ORDERING
        text: Order compliance certifications by scope.
        options:
          - Industry-specific standards
          - Government standards
          - Global standards
        correctOrder:
          - Global standards
          - Government standards
          - Industry-specific standards

      - id: q32
        type: MATCHING
        text: Match compliance frameworks to domains.
        options:
          - healthcare
          - payments
          - data protection
          - government
        optionMap:
          hipaa: HIPAA
          pci: PCI DSS
          gdpr: GDPR
          fedramp: FedRAMP
        correctMap:
          hipaa: healthcare
          pci: payments
          gdpr: data protection
          fedramp: government

      - id: q33
        type: SINGLE_CHOICE
        text: What is conditional access?
        options:
          - Dynamic access policies based on conditions
          - Static permission models
          - Password reset only
        correctAnswer: Dynamic access policies based on conditions

      - id: q34
        type: MULTIPLE_CHOICE
        text: Which are encryption methods in Azure?
        options:
          - Encryption at rest
          - Encryption in transit
          - Transparent Data Encryption
          - No encryption needed
        correctAnswers:
          - Encryption at rest
          - Encryption in transit
          - Transparent Data Encryption

      - id: q35
        type: ORDERING
        text: Order security incident response steps.
        options:
          - Containment
          - Detection
          - Recovery
          - Analysis
        correctOrder:
          - Detection
          - Analysis
          - Containment
          - Recovery

      - id: q36
        type: MATCHING
        text: Match threat detection tools to capabilities.
        options:
          - user behavior
          - network traffic
          - vulnerability scanning
          - malware detection
        optionMap:
          analytics: Behavioral Analytics
          monitor: Network Watcher
          scanner: Vulnerability Scanner
          defender: Defender for Endpoint
        correctMap:
          analytics: user behavior
          monitor: network traffic
          scanner: vulnerability scanning
          defender: malware detection

  - id: s3
    title: Describe Azure management and governance
    questions:

      - id: q37
        type: SINGLE_CHOICE
        text: What is Azure Policy used for?
        options:
          - Enforce organizational standards
          - Manage physical servers
          - Create user accounts
        correctAnswer: Enforce organizational standards

      - id: q38
        type: MULTIPLE_CHOICE
        text: Which are benefits of Resource Groups?
        options:
          - Logical organization
          - Access control
          - Billing aggregation
          - Automatic backup
        correctAnswers:
          - Logical organization
          - Access control
          - Billing aggregation

      - id: q39
        type: ORDERING
        text: Order management scopes from smallest to largest.
        options:
          - Resource
          - Management Group
          - Subscription
          - Resource Group
        correctOrder:
          - Resource
          - Resource Group
          - Subscription
          - Management Group

      - id: q40
        type: MATCHING
        text: Match governance tools to purposes.
        options:
          - cost monitoring
          - standards
          - organization
          - recommendations
        optionMap:
          budgets: Azure Budgets
          policy: Azure Policy
          mg: Management Groups
          advisor: Azure Advisor
        correctMap:
          budgets: cost monitoring
          policy: standards
          mg: organization
          advisor: recommendations

      - id: q41
        type: SINGLE_CHOICE
        text: What does Azure Blueprints enable?
        options:
          - Repeatable environment deployments
          - Physical blueprints
          - Email templates
        correctAnswer: Repeatable environment deployments

      - id: q42
        type: MULTIPLE_CHOICE
        text: Which help control Azure costs?
        options:
          - Reserved Instances
          - Budgets and alerts
          - Auto-shutdown rules
          - Using only premium services
        correctAnswers:
          - Reserved Instances
          - Budgets and alerts
          - Auto-shutdown rules

      - id: q43
        type: ORDERING
        text: Order cost optimization tactics by timing.
        options:
          - Reserved Instances
          - Purchase Savings Plans
          - Right-size resources
          - Monitor usage
        correctOrder:
          - Monitor usage
          - Right-size resources
          - Purchase Savings Plans
          - Reserved Instances

      - id: q44
        type: MATCHING
        text: Match monitoring services to functions.
        options:
          - performance
          - compliance
          - optimization
          - insights
        optionMap:
          monitor: Azure Monitor
          defender: Defender for Cloud
          advisor: Azure Advisor
          insights: Application Insights
        correctMap:
          monitor: performance
          defender: compliance
          advisor: optimization
          insights: insights

      - id: q45
        type: SINGLE_CHOICE
        text: What defines a subscription scope?
        options:
          - Billing and resource container
          - Resource type only
          - User account
        correctAnswer: Billing and resource container

      - id: q46
        type: MULTIPLE_CHOICE
        text: Which reduce Azure operational costs?
        options:
          - Using VM auto-shutdown
          - Reserved pricing
          - Spot instances
          - Continuous 24/7 operation
        correctAnswers:
          - Using VM auto-shutdown
          - Reserved pricing
          - Spot instances

      - id: q47
        type: ORDERING
        text: Order governance phases.
        options:
          - Track and optimize
          - Enforce policies
          - Create baselines
          - Define standards
        correctOrder:
          - Define standards
          - Create baselines
          - Enforce policies
          - Track and optimize

      - id: q48
        type: MATCHING
        text: Match Azure information resources to content.
        options:
          - technical docs
          - best practices
          - assessments
          - training
        optionMap:
          docs: Microsoft Docs
          wellarch: Well-Architected Framework
          advisor: Azure Advisor
          learn: Microsoft Learn
        correctMap:
          docs: technical docs
          wellarch: best practices
          advisor: assessments
          learn: training

  - id: s4
    title: Describe features and tools for deploying resources
    questions:

      - id: q49
        type: SINGLE_CHOICE
        text: What is Azure DevOps for?
        options:
          - Plans, develops, and deploys solutions
          - Email management only
          - Database administration
        correctAnswer: Plans, develops, and deploys solutions

      - id: q50
        type: MULTIPLE_CHOICE
        text: Which are Infrastructure as Code tools?
        options:
          - Terraform
          - ARM templates
          - Bicep
          - Portal clicking
        correctAnswers:
          - Terraform
          - ARM templates
          - Bicep

      - id: q51
        type: ORDERING
        text: Order deployment automation levels.
        options:
          - Scripts
          - Infrastructure as Code
          - CI/CD pipelines
          - Manual portal
        correctOrder:
          - Manual portal
          - Scripts
          - Infrastructure as Code
          - CI/CD pipelines

      - id: q52
        type: MATCHING
        text: Match tools to deployment methods.
        options:
          - visual studio
          - command line
          - declarative
          - continuous
        optionMap:
          portal: Azure Portal
          cli: Azure CLI
          template: ARM Templates
          pipeline: Azure Pipelines
        correctMap:
          portal: visual studio
          cli: command line
          template: declarative
          pipeline: continuous

      - id: q53
        type: SINGLE_CHOICE
        text: What does Infrastructure as Code provide?
        options:
          - Version-controlled repeatable deployments
          - Manual configuration each time
          - Scripting only
        correctAnswer: Version-controlled repeatable deployments

      - id: q54
        type: MULTIPLE_CHOICE
        text: Which are CI/CD best practices?
        options:
          - Automated testing
          - Version control
          - Staged deployments
          - Manual approvals only
        correctAnswers:
          - Automated testing
          - Version control
          - Staged deployments

      - id: q55
        type: ORDERING
        text: Order DevOps pipeline stages.
        options:
          - Deploy
          - Test
          - Build
          - Release
        correctOrder:
          - Build
          - Test
          - Deploy
          - Release

      - id: q56
        type: MATCHING
        text: Match DevOps services to capabilities.
        options:
          - code repository
          - testing
          - deployment
          - monitoring
        optionMap:
          repos: Repos
          pipelines: Pipelines
          release: Release Management
          monitor: Monitor
        correctMap:
          repos: code repository
          pipelines: testing
          release: deployment
          monitor: monitoring
